version: 2
project_name: miro-cli
changelog:
  disable: true
builds:
  - id: miro-cli
    main: ./cmd/miro-cli
    binary: miro-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: miro-cli
    repository:
      owner: olgasafonova
      name: homebrew-tap
    homepage: "https://github.com/olgasafonova/miro-cli"
    description: "Hand-authored Cobra CLI for the Miro REST API."
    install: |
      bin.install "miro-cli"
